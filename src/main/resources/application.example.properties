# Database
db.url=jdbc:postgresql://localhost:5432/okane_transfer
db.username=<db_username>
db.password=<db_password>
db.driver=org.postgresql.Driver

# Hibernate
hibernate.ddl-auto=update
hibernate.show_sql=false

# JWT (min 32 caractères)
jwt.secret=<jwt_secret_min_32_characters>
jwt.expiration=3600000
jwt.expiration.ms=3600000

# Crypto AES-256 (exactement 32 caractères)
crypto.aes.secret=<aes_secret_exactly_32_characters>

# SpringDoc
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.api-docs.path=/v3/api-docs

# Twilio SMS
twilio.account-sid=<twilio_account_sid>
twilio.auth-token=<twilio_auth_token>
twilio.messaging-service-sid=<twilio_messaging_service_sid>

# ===== SCHEDULING DES ALERTS =====
scheduling.enabled=true
scheduling.exchange-rate.cron=0 0 * * * *
scheduling.volume-check.cron=0 */15 * * * *
scheduling.balance-check.cron=0 */30 * * * *
